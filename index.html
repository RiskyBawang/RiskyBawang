<style>

*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;}

.nav-wa{font-size:0.7rem;color:var(--gold2);text-decoration:none;}

.hero{min-height:100vh;padding:7rem 5vw 5rem;position:relative;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 55% 70% at 75% 50%,rgba(45,74,30,0.22) 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 15% 80%,rgba(139,42,26,0.15) 0%,transparent 60%);}
.hero-img-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.09;}
.hero-deco{position:absolute;right:-2vw;top:50%;transform:translateY(-50%);font-family:'Playfair Display',serif;font-size:clamp(7rem,17vw,20rem);font-weight:900;font-style:italic;color:transparent;-webkit-text-stroke:1px rgba(201,146,42,0.07);line-height:1;pointer-events:none;user-select:none;white-space:nowrap;}
.hero-content{position:relative;z-index:2;max-width:680px;}
.hero-eyebrow{display:flex;align-items:center;gap:0.8rem;margin-bottom:1.8rem;}
.eyebrow-line{width:36px;height:1px;background:var(--gold);flex-shrink:0;}
.eyebrow-text{font-size:0.63rem;letter-spacing:0.42em;text-transform:uppercase;color:var(--gold);}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,7vw,6.5rem);font-weight:900;line-height:1.0;letter-spacing:-0.02em;margin-bottom:1rem;}
.hero h1 .accent{color:var(--gold);font-style:italic;}
.hero h1 .light{font-weight:400;font-style:italic;color:var(--cream2);}
.hero-sub{font-size:0.9rem;line-height:1.9;color:var(--text-dim);max-width:460px;margin-bottom:2.5rem;}
.hero-ctas{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-primary{display:inline-flex;align-items:center;gap:0.5rem;padding:0.9rem 2rem;background:var(--gold);color:var(--bg);font-size:0.73rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:background 0.3s;}
.btn-primary:hover{background:var(--gold2);}
.btn-outline{display:inline-flex;align-items:center;padding:0.9rem 2rem;border:1px solid rgba(242,234,216,0.25);color:var(--cream);font-size:0.73rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:border-color 0.3s,color 0.3s;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.hero-stats{display:flex;gap:2.5rem;margin-top:3.5rem;padding-top:2rem;border-top:1px solid rgba(242,234,216,0.08);flex-wrap:wrap;}
.stat-val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--gold2);line-height:1;margin-bottom:0.25rem;}
.stat-key{font-size:0.63rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dimmer);}
.section-tag{font-size:0.6rem;letter-spacing:0.42em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:1rem;}
.about{padding:7rem 5vw;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1150px;margin:0 auto;}
@media(max-width:768px){.about{grid-template-columns:1fr;gap:3rem;}}
.about h2{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4vw,2.8rem);font-weight:700;line-height:1.2;margin-bottom:1.4rem;}
.about h2 em{color:var(--gold);font-style:italic;}
.about p{font-size:0.87rem;line-height:2;color:var(--text-dim);margin-bottom:1rem;}
.about-boxes{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(242,234,216,0.06);}
.about-box{background:var(--bg2);padding:1.8rem 1.4rem;transition:background 0.3s;}

.about-box-icon{font-size:1.7rem;margin-bottom:0.7rem;display:block;}
.about-box h4{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;margin-bottom:0.35rem;color:var(--cream);}
.about-box p{font-size:0.76rem;line-height:1.7;color:var(--text-dimmer);margin:0;}
.products{padding:6rem 5vw;background:var(--bg2);}
.section-header{text-align:center;margin-bottom:3.5rem;}
.section-header h2{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,4vw,2.8rem);font-weight:700;line-height:1.2;margin-top:0.5rem;}
.section-header h2 em{color:var(--gold);font-style:italic;}
.section-header p{font-size:0.84rem;color:var(--text-dim);margin-top:0.7rem;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.8;}
.featured-wrap{max-width:1050px;margin:0 auto 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:700px){.featured-wrap{grid-template-columns:1fr;}}
.product-featured{background:var(--bg);border:1px solid rgba(201,146,42,0.2);position:relative;overflow:hidden;transition:border-color 0.3s;}
.product-featured:hover{border-color:rgba(201,146,42,0.5);}
.product-featured::before{content:'UNGGULAN';position:absolute;top:0.8rem;right:0.9rem;font-size:0.5rem;letter-spacing:0.4em;color:var(--gold);border:1px solid var(--gold);padding:0.18rem 0.5rem;z-index:2;}
.pf-img{width:100%;height:210px;object-fit:cover;object-position:center;display:block;filter:brightness(0.88);}
.pf-body{padding:1.5rem;}
.product-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:0.4rem;color:var(--cream);}
.product-sub{font-size:0.76rem;color:var(--text-dim);margin-bottom:0.8rem;line-height:1.7;}
.product-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;}
.product-tags{display:flex;flex-wrap:wrap;gap:0.4rem;}

.weight-badge{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);white-space:nowrap;}

.product-card{background:var(--bg);overflow:hidden;transition:background 0.3s;position:relative;}
.product-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width 0.4s ease;}
.product-card:hover{background:rgba(201,146,42,0.04);}

.order-card{display:inline-flex;align-items:center;gap:1.3rem;background:var(--bg);border:1px solid rgba(201,146,42,0.25);padding:1.8rem 2.8rem;margin-bottom:2.5rem;transition:border-color 0.3s;}
.order-card:hover{border-color:var(--gold);}
.wa-icon{font-size:2.3rem;}
.order-card-label{font-size:0.6rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--text-dimmer);margin-bottom:0.25rem;}
.order-card-number{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;color:var(--cream);letter-spacing:0.04em;}
@media(max-width:500px){.order-card{flex-direction:column;text-align:center;padding:1.5rem 2rem;}}
.order-steps{display:flex;justify-content:center;flex-wrap:wrap;max-width:680px;margin:0 auto 3rem;}
.step{flex:1;min-width:150px;padding:1.8rem 1.2rem;position:relative;text-align:center;}
.step:not(:last-child)::after{content:'→';position:absolute;right:-0.4rem;top:50%;transform:translateY(-50%);color:var(--text-dimmer);}
@media(max-width:500px){.step:not(:last-child)::after{display:none;}}
.step-num{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:rgba(201,146,42,0.2);line-height:1;margin-bottom:0.45rem;}
.step-text{font-size:0.77rem;color:var(--text-dim);line-height:1.6;}
.wa-btn{display:inline-flex;align-items:center;gap:0.6rem;padding:1.05rem 2.5rem;background:#25d366;color:#fff;text-decoration:none;font-size:0.76rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.3s,transform 0.2s;border-radius:2px;}
.wa-btn:hover{background:#1ebe5a;transform:translateY(-2px);}
footer{padding:2.5rem 5vw;border-top:1px solid rgba(242,234,216,0.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-brand{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;}
.footer-brand span{color:var(--gold);}
.footer-info{font-size:0.7rem;color:var(--text-dimmer);line-height:1.8;text-align:center;}
.footer-wa{font-size:0.7rem;color:var(--gold);text-decoration:none;letter-spacing:0.08em;}
@media(max-width:600px){footer{flex-direction:column;text-align:center;}}
